# =============================================================================
# /etc/logstash/conf.d/beats.conf
# Cyber-Kill-Chain Tracker - Logstash Pipeline Configuration
# Phase 4: Log Parsing & Normalization (Grok Filters)
# =============================================================================
# 목적: Filebeat로부터 수신한 로그를 유형별(Nginx, Auditd, System)로 분류하고
#       Grok 패턴으로 파싱하여 각각의 Elasticsearch 인덱스에 저장한다.
# =============================================================================

input {
  beats {
    port => 5044
  }
}

# =============================================================================
# FILTER 섹션: 로그 유형 판별 및 Grok 파싱
# =============================================================================
filter {

  # -----------------------------------------------------------------------
  # [1] Nginx Access Log 처리
  # Filebeat Nginx 모듈이 이미 구조화 파싱 완료 → 필드 정규화만 수행
  # 실제 데이터 구조: source.address, http.request.method, http.response.status_code, url.original
  # -----------------------------------------------------------------------
  if [log][file][path] =~ "nginx" and [log][file][path] =~ "access" {
    mutate {
      add_field => { "[@metadata][log_type]" => "nginx_access" }

      # Filebeat Nginx 모듈의 ECS 필드를 분석 편의용 필드로 복사
      # (Kibana에서 client_ip, http_method 등으로 바로 검색 가능하게)
      copy => {
        "[source][address]"              => "client_ip"
        "[http][request][method]"        => "http_method"
        "[http][response][status_code]"  => "http_status_code"
        "[url][original]"                => "request_uri"
        "[user_agent][original]"         => "user_agent_str"
      }
    }

    # HTTP 상태 코드 기반 위협 심각도 분류
    if [http_status_code] and [http_status_code] >= 400 and [http_status_code] < 500 {
      mutate { add_field => { "threat_severity" => "medium" } }
    } else if [http_status_code] and [http_status_code] >= 500 {
      mutate { add_field => { "threat_severity" => "high" } }
    } else {
      mutate { add_field => { "threat_severity" => "low" } }
    }

    # 웹 공격 패턴 탐지 (Command Injection, Path Traversal, XSS, SQLi)
    if [request_uri] =~ "(%3B|%3b|%7C|%7c|%26%26|%7C%7C)" or
       [request_uri] =~ "(\.\./|\.\.%2[Ff])" or
       [request_uri] =~ "(%3[Cc]script|alert%28|onerror%3[Dd])" or
       [request_uri] =~ "(union.{0,20}select|select.{0,20}from|drop.{0,20}table)" or
       [request_uri] =~ "(cmd=|exec=|system\(|shell_exec)" {
      mutate {
        add_tag  => ["web_attack_detected"]
        replace  => { "threat_severity" => "critical" }
      }
    }

    # DVWA Command Injection 엔드포인트 접근 탐지
    if [request_uri] =~ "/dvwa/vulnerabilities/exec" or
       [request_uri] =~ "/dvwa/vulnerabilities/sqli" or
       [request_uri] =~ "/dvwa/vulnerabilities/upload" {
      mutate { add_tag => ["dvwa_attack_endpoint"] }
    }

  # -----------------------------------------------------------------------
  # [2] Auditd 로그 파싱
  # Filebeat의 event.module 필드 또는 파일 경로 기준으로 Auditd 판별
  # -----------------------------------------------------------------------
  } else if [event][module] == "auditd" or [log][file][path] =~ "/var/log/audit" {
    mutate {
      add_field => { "[@metadata][log_type]" => "auditd" }
    }

    # Auditd EXECVE 레코드 파싱 (명령어 실행 추적)
    # 예시: type=EXECVE msg=audit(1700000000.123:456): argc=2 a0="whoami" a1="-a"
    if [message] =~ "type=EXECVE" {
      grok {
        match => {
          "message" => 'type=EXECVE msg=audit\(%{NUMBER:audit_epoch}\.%{NUMBER}:%{NUMBER:audit_serial}\): argc=%{NUMBER:argc:int} %{GREEDYDATA:execve_args}'
        }
        tag_on_failure => ["_grok_execve_failure"]
      }
      mutate { add_tag => ["command_execution"] }
    }

    # Auditd SYSCALL 레코드 파싱 (시스템 콜 추적)
    # 예시: type=SYSCALL msg=audit(...): arch=c000003e syscall=59 success=yes exit=0 ... comm="whoami" exe="/usr/bin/whoami" ...
    if [message] =~ "type=SYSCALL" {
      grok {
        match => {
          "message" => 'type=SYSCALL msg=audit\(%{NUMBER:audit_epoch}\.%{NUMBER}:%{NUMBER:audit_serial}\):.*syscall=%{NUMBER:syscall_num:int}.*success=%{WORD:syscall_success}.*comm="%{DATA:process_name}".*exe="%{DATA:exe_path}"'
        }
        tag_on_failure => ["_grok_syscall_failure"]
      }
    }

    # Auditd USER_AUTH / USER_LOGIN 파싱 (인증 이벤트 추적)
    if [message] =~ "type=USER_AUTH" or [message] =~ "type=USER_LOGIN" {
      grok {
        match => {
          "message" => 'type=%{WORD:audit_type}.*acct="%{DATA:auth_account}".*res=%{WORD:auth_result}'
        }
        tag_on_failure => ["_grok_userauth_failure"]
      }
      mutate { add_tag => ["authentication_event"] }

      # 인증 실패 시 위협 표시
      if [auth_result] == "failed" {
        mutate {
          add_tag  => ["auth_failure"]
          add_field => { "threat_severity" => "high" }
        }
      }
    }

  # -----------------------------------------------------------------------
  # [3] System Log 파싱 (syslog, auth.log 등)
  # -----------------------------------------------------------------------
  } else if [log][file][path] =~ "/var/log/syslog" or
             [log][file][path] =~ "/var/log/auth.log" or
             [log][file][path] =~ "/var/log/secure" {
    mutate {
      add_field => { "[@metadata][log_type]" => "system" }
    }

    # Syslog 표준 형식 파싱
    # 예시: Mar 18 12:00:00 web-server sshd[1234]: Failed password for root from 192.168.10.100
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} %{DATA:syslog_process}(?:\[%{POSINT:syslog_pid:int}\])?: %{GREEDYDATA:syslog_message}"
      }
      tag_on_failure => ["_grok_syslog_failure"]
    }

    # SSH 무차별 대입 공격 탐지
    if [syslog_message] =~ "Failed password" or [syslog_message] =~ "authentication failure" {
      mutate {
        add_tag  => ["ssh_brute_force_attempt"]
        add_field => { "threat_severity" => "high" }
      }
    }

    # SSH 루트 로그인 성공 탐지 (매우 위험)
    if [syslog_message] =~ "Accepted.*root" {
      mutate {
        add_tag  => ["root_login_success"]
        add_field => { "threat_severity" => "critical" }
      }
    }

  # -----------------------------------------------------------------------
  # [4] 분류되지 않은 나머지 로그 (fallback)
  # -----------------------------------------------------------------------
  } else {
    mutate {
      add_field => { "[@metadata][log_type]" => "unknown" }
      add_tag   => ["unclassified_log"]
    }
  }

  # -----------------------------------------------------------------------
  # [공통] 불필요한 필드 제거 (Elasticsearch 저장 용량 최적화)
  # -----------------------------------------------------------------------
  mutate {
    remove_field => ["agent", "ecs", "input", "host", "log"]
  }
}

# =============================================================================
# OUTPUT 섹션: 로그 유형별 Elasticsearch 인덱스로 분기 전송
# =============================================================================
output {

  # [디버깅용 stdout 출력] - 운영 환경에서는 주석 처리 권장
  # stdout { codec => rubydebug }

  if [@metadata][log_type] == "nginx_access" {
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "ntAHiBOfSg**Fb0PJTDU"
      ssl_enabled      => true
      ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
      # 날짜별 인덱스 롤오버: log-nginx_access-2025.03.18
      index            => "log-nginx_access-%{+YYYY.MM.dd}"
    }

  } else if [@metadata][log_type] == "auditd" {
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "ntAHiBOfSg**Fb0PJTDU"
      ssl_enabled      => true
      ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
      index            => "log-auditd-%{+YYYY.MM.dd}"
    }

  } else if [@metadata][log_type] == "system" {
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "ntAHiBOfSg**Fb0PJTDU"
      ssl_enabled      => true
      ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
      index            => "log-system-%{+YYYY.MM.dd}"
    }

  } else {
    # 분류 불명 로그는 별도 인덱스에 보관 (트러블슈팅 및 분석)
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "ntAHiBOfSg**Fb0PJTDU"
      ssl_enabled      => true
      ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
      index            => "log-unknown-%{+YYYY.MM.dd}"
    }
  }
}
